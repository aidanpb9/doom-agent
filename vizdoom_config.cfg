# Vizdoom Configuration File
# This configures the Doom game environment

# Screen settings
screen_resolution = RES_640X480
screen_format = RGB24

# Rendering options
render_hud = true
render_crosshair = true
render_weapon = true
render_decals = false
render_particles = false
render_messages = false
render_corpses = false

# Buffers for perception
depth_buffer_enabled = true
labels_buffer_enabled = true
automap_buffer_enabled = true
automap_rotate = true
automap_mode = WHOLE
automap_render_textures = false

# Window settings
window_visible = true

# Game variables
available_game_variables =
{
    HEALTH
    AMMO2
    POSITION_X
    POSITION_Y
    ANGLE
    KILLCOUNT
}

# Buttons
available_buttons =
{
    MOVE_FORWARD
    TURN_LEFT
    TURN_RIGHT
    MOVE_LEFT
    MOVE_RIGHT
    ATTACK
    USE
}

# Episode settings
episode_timeout = 525
episode_start_time = 10
living_reward = -1
death_penalty = 100

# Difficulty
doom_skill = 3
