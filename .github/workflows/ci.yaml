name: CI

#Runs on pushes to the working baseline branch and on any PR targeting main.
#Integration tests are excluded (require VizDoom + WAD file not available in CI).
#When this repo moves into the flight software repo, update working-directory
#in both steps below to reflect the actual subfolder path.
on:
  push:
    branches: [doom_main]
  pull_request:
    branches: [main]

jobs:
  test:
    #ubuntu-latest is fastest on GitHub's free tier and closest to a CubeSat Linux environment.
    runs-on: ubuntu-latest
    strategy:
      #Matrix runs the full test suite against both versions in parallel.
      #3.10 matches local dev environment. 3.11 catches forward-compatibility issues.
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        #TODO: update working-directory once flight software repo structure is defined
        #".[dev]" installs runtime deps + pytest and ruff from pyproject.toml
        run: pip install ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Run tests
        #-m "not local" skips integration tests that require VizDoom and doom.wad
        #TODO: update working-directory once flight software repo structure is defined
        run: pytest tests/ -m "not local" -v
